name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build production app
        run: npm run build:prod

      - name: Normalize and validate WIF provider
        id: wif
        shell: bash
        run: |
          RAW_PROVIDER='${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          if [ -z "$RAW_PROVIDER" ]; then
            echo "Missing secret: GCP_WORKLOAD_IDENTITY_PROVIDER"
            exit 1
          fi

          RAW_PROVIDER="$(printf '%s' "$RAW_PROVIDER" | tr -d '\r')"
          RAW_PROVIDER="${RAW_PROVIDER//$'\n'/}"
          RAW_PROVIDER="${RAW_PROVIDER#\"}"
          RAW_PROVIDER="${RAW_PROVIDER%\"}"
          RAW_PROVIDER="${RAW_PROVIDER#\'}"
          RAW_PROVIDER="${RAW_PROVIDER%\'}"
          RAW_PROVIDER="$(echo "$RAW_PROVIDER" | xargs)"

          NORMALIZED_PROVIDER="${RAW_PROVIDER#https://iam.googleapis.com/}"
          NORMALIZED_PROVIDER="${NORMALIZED_PROVIDER#http://iam.googleapis.com/}"
          NORMALIZED_PROVIDER="${NORMALIZED_PROVIDER#iam.googleapis.com/}"
          NORMALIZED_PROVIDER="${NORMALIZED_PROVIDER#//iam.googleapis.com/}"
          NORMALIZED_PROVIDER="${NORMALIZED_PROVIDER#/}"

          if ! echo "$NORMALIZED_PROVIDER" | grep -Eq '^projects/[0-9]+/locations/global/workloadIdentityPools/[^/]+/providers/[^/]+$'; then
            echo "Invalid GCP_WORKLOAD_IDENTITY_PROVIDER format."
            echo "Expected: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID"
            echo "Current: $RAW_PROVIDER"
            exit 1
          fi

          echo "provider=$NORMALIZED_PROVIDER" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: envio-examenes
          workload_identity_provider: ${{ steps.wif.outputs.provider }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify OIDC authentication
        run: |
          test -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" || (echo "Missing secret: GCP_WORKLOAD_IDENTITY_PROVIDER" && exit 1)
          test -n "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" || (echo "Missing secret: GCP_SERVICE_ACCOUNT_EMAIL" && exit 1)
          gcloud auth list
          gcloud config set project envio-examenes
          echo "OIDC authentication step completed"

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting + Rules
        run: firebase deploy --project envio-examenes --only hosting,firestore:rules,firestore:indexes,storage

      - name: Deploy Functions (non-blocking)
        id: deploy_functions
        continue-on-error: true
        run: firebase deploy --project envio-examenes --only functions

      - name: Functions deploy warning
        if: steps.deploy_functions.outcome == 'failure'
        run: |
          echo "Functions deploy failed, but hosting/rules were deployed successfully."
          echo "Review IAM/Billing/API permissions for Cloud Functions and retry."
