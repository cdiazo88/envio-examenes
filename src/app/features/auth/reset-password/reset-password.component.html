<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-500 to-primary-700 px-4 py-12">
  <div class="max-w-md w-full">
    <!-- Logo y Título -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-full mb-4">
        <svg class="w-10 h-10 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-white">Recuperar Contraseña</h1>
      <p class="text-primary-100 mt-2">Te enviaremos un link para restablecer tu contraseña</p>
    </div>

    <!-- Formulario -->
    <div class="bg-white rounded-lg shadow-xl p-8">
      <!-- Mensaje de éxito -->
      <div *ngIf="success" class="mb-6 p-4 bg-secondary-50 border border-secondary-200 rounded-lg">
        <div class="flex">
          <svg class="w-5 h-5 text-secondary-600 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <div class="ml-3">
            <h3 class="text-sm font-medium text-secondary-800">¡Email enviado!</h3>
            <p class="mt-1 text-sm text-secondary-700">
              Revisa tu bandeja de entrada y sigue las instrucciones para restablecer tu contraseña.
            </p>
          </div>
        </div>
      </div>

      <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" *ngIf="!success">
        <!-- Email -->
        <div class="mb-6">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
            Correo Electrónico
          </label>
          <input
            type="email"
            id="email"
            formControlName="email"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent transition"
            [class.border-danger-500]="email?.invalid && email?.touched"
            placeholder="correo@ejemplo.com"
          />
          <div *ngIf="email?.invalid && email?.touched" class="mt-1 text-sm text-danger-600">
            <span *ngIf="email?.errors?.['required']">El correo es requerido</span>
            <span *ngIf="email?.errors?.['email']">El correo no es válido</span>
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="mb-4 p-3 bg-danger-50 border border-danger-200 rounded-lg">
          <p class="text-sm text-danger-700">{{ errorMessage }}</p>
        </div>

        <!-- Botón Submit -->
        <button
          type="submit"
          [disabled]="loading"
          class="w-full bg-primary-600 text-white py-3 rounded-lg font-semibold hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span *ngIf="!loading">Enviar Instrucciones</span>
          <span *ngIf="loading" class="flex items-center justify-center">
            <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Enviando...
          </span>
        </button>
      </form>

      <!-- Volver al login -->
      <div class="mt-6 text-center">
        <a
          routerLink="/auth/login"
          class="text-sm text-primary-600 hover:text-primary-700 font-medium inline-flex items-center"
        >
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Volver al inicio de sesión
        </a>
      </div>
    </div>
  </div>
</div>
