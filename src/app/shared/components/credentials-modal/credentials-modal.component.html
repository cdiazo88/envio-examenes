<div *ngIf="isOpen" class="modal-overlay">
  <div class="modal-content max-w-lg w-full">
    <div class="modal-header">
      <h3 class="modal-title">{{ title }}</h3>
      <button (click)="close()" class="modal-close" type="button">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <div class="modal-body space-y-4">
      <div>
        <p class="text-sm text-gray-500">Nombre</p>
        <p class="text-base font-medium text-gray-900">{{ nombre }}</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Email</p>
        <div class="flex items-center gap-2 mt-1">
          <input class="form-input" [value]="email" readonly>
          <button type="button" class="btn btn-secondary whitespace-nowrap" (click)="copyEmail()">Copiar</button>
        </div>
      </div>

      <div>
        <p class="text-sm text-gray-500">Contraseña</p>
        <div class="flex items-center gap-2 mt-1">
          <input class="form-input font-mono" [value]="password" readonly>
          <button type="button" class="btn btn-secondary whitespace-nowrap" (click)="copyPassword()">Copiar</button>
        </div>
      </div>

      <button type="button" class="btn btn-primary" (click)="copyAll()">Copiar credenciales completas</button>

      <p *ngIf="copiedState !== 'none'" class="text-sm text-green-700">Copiado al portapapeles</p>

      <p *ngIf="warningText" class="text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded p-3">
        {{ warningText }}
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-primary" (click)="close()">Entendido</button>
    </div>
  </div>
</div>
