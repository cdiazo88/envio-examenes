<nav class="bg-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Logo y título -->
      <div class="flex items-center">
        <div class="flex-shrink-0 flex items-center">
          <svg class="h-8 w-8 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          <span class="ml-2 text-xl font-bold text-gray-900">{{ title }}</span>
        </div>

        <div
          *ngIf="(session$ | async) as session"
          class="ml-3"
        >
          <div
            *ngIf="session.role === 'destinatario' && session.destinatarioTipo === 'paciente' && (pacienteSessionRemainingSeconds$ | async) as remainingSeconds"
            class="flex items-center px-2 md:px-3 py-1 rounded-md bg-gray-100 text-gray-700 text-xs md:text-sm font-medium"
          >
            Sesión: {{ formatRemainingTime(remainingSeconds) }}
          </div>
        </div>

        <!-- Links de navegación (desktop) -->
        <div class="hidden md:ml-10 md:flex md:space-x-8">
          <a
            *ngFor="let link of links"
            [routerLink]="link.path"
            routerLinkActive="border-primary-500 text-gray-900"
            [routerLinkActiveOptions]="{exact: false}"
            class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition"
          >
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="link.icon"></path>
            </svg>
            {{ link.label }}
          </a>
        </div>
      </div>

      <!-- Menú de usuario -->
      <div class="flex items-center">
        <div class="relative" *ngIf="session$ | async as session">
          <!-- Botón del menú -->
          <button
            (click)="toggleMenu()"
            class="flex items-center space-x-3 py-2 px-4 rounded-lg hover:bg-gray-100 transition"
          >
            <div class="w-8 h-8 rounded-full bg-primary-600 flex items-center justify-center">
              <span class="text-white font-medium text-sm">
                {{ session.nombre.charAt(0)}}{{ session.apellido.charAt(0) }}
              </span>
            </div>
            <span class="hidden md:block text-sm font-medium text-gray-700">
              {{ session.nombre }} {{ session.apellido }}
            </span>
            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <!-- Dropdown menu -->
          <div
            *ngIf="menuOpen"
            class="absolute right-0 mt-2 w-48 rounded-lg shadow-lg bg-white ring-1 ring-black ring-opacity-5 z-50"
          >
            <div class="py-1">
              <div class="px-4 py-3 border-b border-gray-200">
                <p class="text-sm font-medium text-gray-900">{{ session.nombre }} {{ session.apellido }}</p>
                <p class="text-xs text-gray-500 mt-1">{{ session.email }}</p>
              </div>
              
              <button
                (click)="logout()"
                class="w-full text-left px-4 py-2 text-sm text-danger-700 hover:bg-danger-50 flex items-center transition"
              >
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                Cerrar Sesión
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Menú móvil -->
  <div class="md:hidden border-t border-gray-200" *ngIf="menuOpen">
    <div class="pt-2 pb-3 space-y-1">
      <a
        *ngFor="let link of links"
        [routerLink]="link.path"
        routerLinkActive="bg-primary-50 border-primary-500 text-primary-700"
        (click)="menuOpen = false"
        class="border-transparent text-gray-600 hover:bg-gray-50 hover:border-gray-300 hover:text-gray-800 block pl-3 pr-4 py-2 border-l-4 text-base font-medium transition"
      >
        {{ link.label }}
      </a>
    </div>
  </div>
</nav>
